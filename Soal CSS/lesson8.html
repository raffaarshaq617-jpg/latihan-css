<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson 8</title>
    <style>
        .input-block {
            display: block;
            margin-bottom: 5px;
        }

        .survey-text {
            display: inline-block;
            width: 300px;
            vertical-align: middle;
            margin-right: 10px;
        }

        .survey-button {
            vertical-align: middle;
        }

        .google-container {
            text-align: center;
            margin-top: 50px;
        }

        .google-logo {
            width: 200px;
            display: block;
            margin: 0 auto 10px auto;
        }

        .search-box {
            width: 400px;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #dfe1e5;
            box-shadow: 1px 1px 5px rgba(0,0,0,0.1);
            outline: none;
        }
    </style>
</head>
<body>

    <input type="text" class="input-block" placeholder="Name">
    <input type="text" class="input-block" placeholder="Email">

    <br><br>

    <p class="survey-text">
        thanks for chatting with our customer support. would you like to take our quick survey?
    </p>
    <button class="survey-button">yes</button>
    <button class="survey-button">no</button>

    <br><br>

    <div class="google-container">
        <img class="google-logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google Logo">
        <input type="text" class="search-box" placeholder="Search Google or type a URL">
    </div>

</body>

<hr>

<div class="signup-container">
    <input type="text" class="first-name" placeholder="First name">
    <input type="text" class="last-name" placeholder="Last name">
    <input type="text" class="email-full" placeholder="Email">
    <button class="signup-button">Sign Up</button>
  </div>

  <div class="uber-container">
    <h1 class="uber-title">Request a ride now</h1>
    <input type="text" class="uber-input" placeholder="Enter pickup location">
    <input type="text" class="uber-input" placeholder="Enter destination">
    <button class="request-btn">Request now</button>
    <button class="schedule-btn">Schedule for later</button>
  </div>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 50px;
    }

    .signup-container {
      background-color: white;
      padding: 20px;
      width: 360px;
      border-radius: 4px;
      margin-bottom: 50px;
    }

    .first-name, .last-name {
      display: inline-block;
      width: 160px;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .email-full {
      display: block;
      width: 338px;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .signup-button {
      background-color: #457dfb;
      color: white;
      border: none;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    .uber-container {
      background-color: white;
      padding: 25px;
      width: 400px;
      border-radius: 4px;
    }

    .uber-title {
      font-size: 30px;
      margin-top: 0;
      margin-bottom: 25px;
    }

    .uber-input {
      display: block;
      width: 100%;
      background-color: #eeeeee;
      border: none;
      padding: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    .request-btn {
      background-color: black;
      color: white;
      border: none;
      padding: 12px 20px;
      margin-right: 10px;
      cursor: pointer;
    }

    .schedule-btn {
      background-color: #eeeeee;
      color: black;
      border: none;
      padding: 12px 20px;
      cursor: pointer;
    }
  </style>
</body>
</html>
