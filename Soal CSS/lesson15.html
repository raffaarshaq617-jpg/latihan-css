<!DOCTYPE html>
<html>
<head>
  <title>Lesson 15</title>

<body style="
  height:3000px;
  font-family:Arial;
  margin:0;
  background:#f2f2f2;
  padding-top:80px;
  padding-left:60px;
">
  <div style="
    position: absolute;
    top: 20px;
    right: 20px;
    background: black;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
  ">

    right: 20px;

  ">
  </div>

  <div style="
    margin-top: 40px;
    width: 320px;
    height: 180px;
    background: lightgray;
    position: relative;
  ">

    <div style="
      position: absolute;
      top: -15px;
      left: -15px;
      background: black;
      color: white;

  </div>

  <div style="
    margin-top: 40px;
    width: 320px;
    height: 180px;
    background: gray;
    position: relative;
  ">

    <div style="
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: black;
      color: white;
      font-size:12px;
      padding:3px 6px;
    ">
      0:29
    </div>

  </div>

  <div style="margin-top:60px; display:flex; gap:40px;">

    <!-- 15e -->
    <div style="
      position: relative;

      <img src="folder-gambar/baju1.png"
           style="width:200px; display:block;">

        position: absolute;
        top: 30px;
        right: 30px;
        background: black;
        color: white;
        font-size:12px;
        padding:5px 8px;
      ">
        20% OFF
      </div>

    </div>


    <!-- 15f -->
    <div style="
      position: relative;
      background: white;

    ">

      <div style="

        right: 30px;
        background: black;
        color: white;
        font-size:12px;
        padding:5px 8px;
      ">
        20% OFF
      </div>

      <div style="
        position: absolute;
        bottom: 20px;
        left: 0;
        right: 0;
        background: rgba(255,255,255,0.8);

        text-align: center;
      ">
        <button style="
          padding:6px 12px;
